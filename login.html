<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sign In – WAG Enterprises</title>
<link rel="stylesheet" href="css/shared.css">
<style>
*{-webkit-font-smoothing:antialiased;}
html,body{height:100%;overflow-x:hidden;}
/* Background always stays brand blue regardless of theme */
body{background:linear-gradient(160deg,var(--brand-deep) 0%,var(--brand-mid) 60%,var(--brand-light) 100%) !important;min-height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
.login-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;flex-shrink:0;}
.login-back{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;text-decoration:none;transition:background .2s;}
.login-theme-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:background .2s;}

/* HERO */
.login-hero{text-align:center;padding:8px 24px 24px;flex-shrink:0;}
.login-logo{width:72px;height:72px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 0 0 12px rgba(var(--yellow-rgb),.1),0 0 0 26px rgba(var(--yellow-rgb),.05);}
.login-hero-title{color:#fff;font-size:22px;font-weight:900;margin-bottom:4px;}
.login-hero-sub{color:rgba(255,255,255,.5);font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;}

/* ROLE TOGGLE — always on the blue background */
.role-toggle-outer{display:flex;gap:10px;justify-content:center;padding:0 20px 22px;flex-shrink:0;}
.role-btn-outer{flex:1;max-width:160px;padding:12px 10px;border:2px solid rgba(255,255,255,.2);border-radius:14px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .22s;}
.role-btn-outer.active{background:var(--yellow);color:#111;border-color:var(--yellow);box-shadow:0 4px 16px rgba(var(--yellow-rgb),.4);}

/* FLOATING CARD — goes dark in dark mode, stays white in light mode */
.login-card{background:#fff;border-radius:28px;margin:0 18px 32px;padding:26px 22px 32px;box-shadow:0 8px 40px rgba(0,0,0,.25),0 2px 12px rgba(0,0,0,.12);animation:cardSlideUp .4s cubic-bezier(.34,1.1,.64,1) both;}
body.dark .login-card{background:#1a1a1a;}
@keyframes cardSlideUp{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}

/* AUTH TABS */
.auth-tab-row{display:flex;background:#f1f3f7;border-radius:11px;padding:4px;margin-bottom:22px;}
body.dark .auth-tab-row{background:#2a2a2a;}
.auth-tab-btn{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;color:#6b7280;transition:all .22s;}
body.dark .auth-tab-btn{color:#888;}
.auth-tab-btn.active{background:var(--blue);color:#fff;}
body.dark .auth-tab-btn.active{background:var(--yellow);color:#111;}

/* FORM */
.fgroup{margin-bottom:16px;}
.flabel{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.9px;text-transform:uppercase;margin-bottom:7px;display:block;}
body.dark .flabel{color:#888;}
.finput{width:100%;padding:14px 15px;border:2px solid var(--border);border-radius:12px;font-size:16px;background:#fff;color:#111;transition:border .2s,box-shadow .2s;}
body.dark .finput{background:#111;color:#f0f0f0;border-color:#2a2a2a;}
.finput:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(var(--blue-rgb),.08);}
body.dark .finput:focus{border-color:var(--yellow);}
.pin-wrap{position:relative;}
.pin-wrap .finput{padding-right:46px;}
.pw-eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--sub);display:flex;align-items:center;padding:4px;}

/* SUBMIT */
.submit-btn{width:100%;padding:16px;background:var(--yellow);color:#111;border:none;border-radius:13px;font-size:16px;font-weight:800;cursor:pointer;margin-top:4px;transition:all .22s;box-shadow:0 4px 16px rgba(var(--yellow-rgb),.35);}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(var(--yellow-rgb),.45);}
.submit-btn:active{transform:scale(.98);}

/* FORGOT */
.forgot-link{display:block;text-align:center;font-size:12px;color:var(--blue);font-weight:700;margin-top:12px;cursor:pointer;}
body.dark .forgot-link{color:var(--yellow);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
 <div class="loading-spinner"></div>
 <div class="loading-text" id="loadingText">Please wait…</div>
</div>

<!-- TOPBAR -->
<div class="login-topbar">
 <a href="index.html" class="login-back">←</a>
 <span></span>
 <button class="login-theme-btn" onclick="toggleTheme()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
 </button>
</div>

<!-- HERO -->
<div class="login-hero">
 <div class="login-logo">
  <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:36px;height:36px;"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M6 9v.01M18 15v.01"/></svg>
 </div>
 <div class="login-hero-title">Welcome back</div>
 <div class="login-hero-sub">Wonderful & Able God Enterprises</div>
</div>

<!-- ROLE TOGGLE — outside the card, on the blue background -->
<div class="role-toggle-outer">
 <button class="role-btn-outer active" id="roleCustomer" onclick="setRole('customer')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  Customer
 </button>
 <button class="role-btn-outer" id="roleRep" onclick="setRole('representative')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
  Representative
 </button>
</div>

<!-- FLOATING CARD -->
<div class="login-card">
 <div class="auth-tab-row">
  <button class="auth-tab-btn active" id="tabSignIn">Sign In</button>
  <button class="auth-tab-btn" onclick="window.location.href='register.html'">Create Account</button>
 </div>

 <!-- Customer form -->
 <div id="custForm">
  <div class="fgroup">
   <label class="flabel">Phone Number</label>
   <input type="tel" id="loginPhone" class="finput" placeholder="e.g. 08012345678" maxlength="11">
  </div>
  <div class="fgroup">
   <label class="flabel">Password</label>
   <div class="pin-wrap">
    <input type="password" id="loginPin" class="finput" placeholder="Enter your password" maxlength="100">
    <button type="button" class="pw-eye" onclick="togglePw('loginPin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
   </div>
  </div>
  <div id="loginMsg"></div>
  <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In as Customer</button>
  <a class="forgot-link" onclick="showForgotModal();return false;">Forgot Password?</a>
 </div>

 <!-- Rep form -->
 <div id="repForm" style="display:none;">
  <div class="fgroup">
   <label class="flabel">Agent ID</label>
   <input type="text" id="loginRepId" class="finput" placeholder="e.g. 234567" maxlength="6" inputmode="numeric">
  </div>
  <div class="fgroup">
   <label class="flabel">Password</label>
   <div class="pin-wrap">
    <input type="password" id="loginRepPin" class="finput" placeholder="Enter your password" maxlength="100">
    <button type="button" class="pw-eye" onclick="togglePw('loginRepPin')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
   </div>
  </div>
  <div id="loginRepMsg"></div>
  <button class="submit-btn" id="loginRepBtn" onclick="doLogin()">Sign In as Representative</button>
  <a class="forgot-link" onclick="showForgotModal();return false;">Forgot Password?</a>
 </div>
</div>

<!-- Reset Password Modal -->
<div id="resetPasswordModal" class="modal" style="align-items:center;">
 <div class="msheet" style="max-width:480px;position:relative;border-radius:20px;">
  <div class="m-handle"></div>
  <div class="m-title">Create New Password</div>
  <div class="msg-info" id="resetTokenInfo">Enter your new password below.</div>
  <div class="mform-group"><label class="form-lbl">New Password</label>
   <div class="pin-wrap"><input type="password" id="newPasswordInp" class="form-inp finput" placeholder="Enter new password" maxlength="100">
   <button type="button" class="pw-eye" onclick="togglePw('newPasswordInp')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
  </div>
  <div class="mform-group"><label class="form-lbl">Confirm Password</label>
   <div class="pin-wrap"><input type="password" id="confirmPasswordInp" class="form-inp finput" placeholder="Confirm new password" maxlength="100">
   <button type="button" class="pw-eye" onclick="togglePw('confirmPasswordInp')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
  </div>
  <div id="resetPasswordMsg"></div>
  <button class="btn btn-blue" onclick="doResetPassword()" style="margin-top:8px;">Save New Password</button>
 </div>
</div>

<div id="forgotModal" class="modal"><div class="msheet" style="max-width:480px;position:relative;"><button class="m-close" onclick="closeModal('forgotModal')">×</button><div class="m-handle"></div><div class="m-title">Reset Password</div><div class="msg-info">Enter your email and we'll send you a password reset link.</div><div class="mform-group"><label class="form-lbl">Email Address</label><input type="email" id="resetEmail" class="form-inp"></div><div id="resetMsg"></div><button class="btn btn-blue" onclick="doForgotPin()">Send Password Reset Link</button></div></div>

<script>
let currentRole = localStorage.getItem('wagLandRole') || 'customer';
initTheme();

function setRole(r) {
  currentRole = r;
  localStorage.setItem('wagLandRole', r);
  document.getElementById('roleCustomer').classList.toggle('active', r === 'customer');
  document.getElementById('roleRep').classList.toggle('active', r === 'representative');
  document.getElementById('custForm').style.display = r === 'customer' ? 'block' : 'none';
  document.getElementById('repForm').style.display = r === 'customer' ? 'none' : 'block';
  document.getElementById('loginBtn') && (document.getElementById('loginBtn').textContent = 'Sign In as Customer');
  document.getElementById('loginRepBtn') && (document.getElementById('loginRepBtn').textContent = 'Sign In as Representative');
}

(function redirectIfLoggedIn(){
  const u = getUser();
  if(u && u.role && ROLE_HOME[u.role]) window.location.replace(rootPath() + ROLE_HOME[u.role]);
})();

setRole(currentRole);
initEmailJS();
checkResetTokenInURL();

document.getElementById('loginPin')?.addEventListener('keypress', e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('loginRepPin')?.addEventListener('keypress', e=>{ if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>

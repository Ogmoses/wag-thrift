<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Settings – WAG Admin</title>
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/admin.js"></script>
</head>
<body>

<div id="adminShellRoot"></div>

<div id="appShell">
  <main class="main-content" id="mainContent">

    <!-- AUDIT LOG -->
    <div class="page active" id="page-auditlog">
      <div style="position:sticky;top:57px;z-index:100;background:var(--bg);padding:12px 16px 0;margin:0;">
        <div class="search-row" style="margin-bottom:0;">
          <input type="text" id="auditSearchInp" class="search-inp" placeholder="Search by action, description, role…" oninput="filterAuditLog()">
        </div>
      </div>
      <div class="page-inner" style="padding-top:10px;">
        <div class="section-card"><div id="auditLogList"><div class="empty-state">Loading…</div></div></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="page" id="page-settings">
      <div class="page-inner">
        <div class="section-card">
          <div class="section-card-title">Appearance</div>
          <div style="font-size:12px;color:var(--sub);margin-bottom:12px;">Choose how the admin portal looks on this device</div>
          <div style="display:flex;gap:8px;">
            <button id="aThemeLight" onclick="adminSetTheme('light')" style="flex:1;padding:12px 6px;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;display:block;margin:0 auto 4px;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>Light
            </button>
            <button id="aThemeDark" onclick="adminSetTheme('dark')" style="flex:1;padding:12px 6px;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;display:block;margin:0 auto 4px;"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>Dark
            </button>
            <button id="aThemeSystem" onclick="adminSetTheme('system')" style="flex:1;padding:12px 6px;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;display:block;margin:0 auto 4px;"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>System
            </button>
          </div>
        </div>

        <div class="section-card">
          <div class="section-card-title">Admin PIN Management</div>
          <div class="settings-group">
            <label class="settings-label">Current PIN (required)</label>
            <input type="password" id="settCurrentPin" class="settings-inp" placeholder="Current PIN">
          </div>
          <div class="settings-group">
            <label class="settings-label">New PIN</label>
            <input type="password" id="settNewPin" class="settings-inp" placeholder="New PIN (min 8 chars)">
          </div>
          <div class="settings-group">
            <label class="settings-label">Confirm New PIN</label>
            <input type="password" id="settConfirmPin" class="settings-inp" placeholder="Confirm new PIN">
          </div>
          <div id="settMsg"></div>
          <button class="btn btn-yellow" onclick="changeAdminPin()" style="margin-top:4px;">Update PIN</button>
        </div>

        <div class="section-card">
          <div class="section-card-title">Security Log (This Session)</div>
          <div id="securityLog"><div class="empty-state">No login events this session</div></div>
        </div>

        <div class="section-card" style="opacity:.6;">
          <div class="section-card-title">System Info</div>
          <div style="font-size:12px;color:var(--sub);line-height:1.7;">
            <div>App: WAG — Wonderful &amp; Able God Enterprises</div>
            <div>Portal: Super Admin v2.0</div>
            <div>Database: Supabase (shared)</div>
            <div>Session: <span id="sessionStart">—</span></div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
const _a = requireAdmin();
if (_a) {
  initAdminTheme();
  const initial = (location.hash === '#auditlog') ? 'auditlog' : 'settings';
  renderAdminShell(initial, initial === 'auditlog' ? 'Audit Log' : 'Settings');

  function showAdminTab(page) {
    currentPage = page;
    document.getElementById('page-auditlog').classList.toggle('active', page === 'auditlog');
    document.getElementById('page-settings').classList.toggle('active', page === 'settings');
    document.querySelector('.topbar-title').textContent = page === 'auditlog' ? 'Audit Log' : 'Settings';
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.getAttribute('href') === (page === 'auditlog' ? 'settings.html#auditlog' : 'settings.html'));
    });
    history.replaceState(null, '', page === 'auditlog' ? '#auditlog' : location.pathname);
    if (page === 'auditlog') renderAuditLog(); else { renderSecurityLog(); renderAdminSessionInfo(); }
  }

  document.querySelectorAll('.nav-item').forEach(n => {
    const href = n.getAttribute('href');
    if (href === 'settings.html' || href === 'settings.html#auditlog') {
      n.addEventListener('click', e => { e.preventDefault(); showAdminTab(href.includes('#') ? 'auditlog' : 'settings'); });
    }
  });

  showAdminTab(initial);
  closeSidebar();
}
</script>
</body>
</html>

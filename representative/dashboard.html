<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Overview – WAG Admin</title>
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/admin.js"></script>
</head>
<body>

<div id="adminShellRoot"></div>

<div id="appShell">
  <main class="main-content" id="mainContent">

    <!-- OVERVIEW -->
    <div class="page active" id="page-overview">
      <div class="page-inner">
        <div class="overview-grid">
          <div class="ov-card"><div class="ov-lbl">Customers</div><div class="ov-val" id="ovCust">—</div><div class="ov-sub">registered</div></div>
          <div class="ov-card"><div class="ov-lbl">Field Agents</div><div class="ov-val" id="ovReps">—</div><div class="ov-sub">active</div></div>
          <div class="ov-card green"><div class="ov-lbl">Total Deposits</div><div class="ov-val" id="ovDeposits">—</div><div class="ov-sub">all time</div></div>
          <div class="ov-card red"><div class="ov-lbl">Total Payouts</div><div class="ov-val" id="ovPayouts">—</div><div class="ov-sub">disbursed</div></div>
          <div class="ov-card orange"><div class="ov-lbl">Pending Withdrawals</div><div class="ov-val" id="ovPendingDisb">—</div><div class="ov-sub">awaiting review</div></div>
          <div class="ov-card"><div class="ov-lbl">Active Plans</div><div class="ov-val" id="ovPlans">—</div><div class="ov-sub">in progress</div></div>
        </div>

        <div class="section-card">
          <div class="section-card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Pending Disbursements
            <a href="#disbursements" id="ovViewAllDisb" style="float:right;font-size:11px;color:var(--yellow);text-decoration:none;">View all →</a>
          </div>
          <div id="ovDisbList"><div class="empty-state">Loading…</div></div>
        </div>

        <div class="section-card">
          <div class="section-card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
            Recent Activity
          </div>
          <div id="ovAuditList"><div class="empty-state">Loading…</div></div>
        </div>
      </div>
    </div>

    <!-- DISBURSEMENTS -->
    <div class="page" id="page-disbursements">
      <div class="page-inner">
        <div class="section-card" style="margin-bottom:10px;">
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <select id="disbFilterStatus" class="search-inp" style="flex:none;width:auto;padding:8px 12px;font-size:13px;" onchange="renderDisbPage()">
              <option value="pending">Pending</option>
              <option value="reviewed">Reviewed</option>
              <option value="approved">Approved</option>
              <option value="paid">Paid</option>
              <option value="rejected">Rejected</option>
              <option value="">All</option>
            </select>
            <button class="btn btn-ghost" onclick="renderDisbPage()" style="padding:8px 14px;font-size:12px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;display:inline-block;vertical-align:middle;margin-right:4px;"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Refresh</button>
          </div>
        </div>
        <div id="disbPageList"><div class="empty-state">Loading…</div></div>
      </div>
    </div>

  </main>
</div>

<script>
const _a = requireAdmin();
if (_a) {
  initAdminTheme();
  const initial = (location.hash === '#disbursements') ? 'disbursements' : 'overview';
  renderAdminShell(initial, initial === 'disbursements' ? 'Disbursements' : 'Overview');

  function showAdminTab(page) {
    currentPage = page;
    document.getElementById('page-overview').classList.toggle('active', page === 'overview');
    document.getElementById('page-disbursements').classList.toggle('active', page === 'disbursements');
    document.querySelector('.topbar-title').textContent = page === 'disbursements' ? 'Disbursements' : 'Overview';
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.getAttribute('href') === (page === 'disbursements' ? 'dashboard.html#disbursements' : 'dashboard.html'));
    });
    history.replaceState(null, '', page === 'disbursements' ? '#disbursements' : location.pathname);
    if (page === 'disbursements') renderDisbPage(); else renderOverview();
  }

  // Intercept the Overview / Disbursements nav links so they switch tabs in-page
  document.querySelectorAll('.nav-item').forEach(n => {
    const href = n.getAttribute('href');
    if (href === 'dashboard.html' || href === 'dashboard.html#disbursements') {
      n.addEventListener('click', e => { e.preventDefault(); showAdminTab(href.includes('#') ? 'disbursements' : 'overview'); });
    }
  });
  document.getElementById('ovViewAllDisb').addEventListener('click', e => { e.preventDefault(); showAdminTab('disbursements'); });

  showAdminTab(initial);
  closeSidebar();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dashboard – WAG Enterprises</title>
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/representative.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/representative.js"></script>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
 <div class="loading-spinner"></div>
 <div class="loading-text" id="loadingText">Please wait…</div>
</div>

<div id="repView" class="view active">
 <div class="dash-header">
 <div class="avatar-c" id="repAv">?</div>
 <div class="hdr-info"><div class="hdr-name" id="repName">—</div><div class="hdr-sub" id="repCode">Code: —</div></div>
 <div class="hdr-right"><button class="signout-btn" onclick="doLogout()" style="padding:7px 14px;border-radius:8px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);color:#fff;cursor:pointer;flex-shrink:0;font-size:12px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:5px;white-space:nowrap;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;flex-shrink:0;"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button></div>
 </div>
 <div style="padding-bottom:80px;">
 <div class="rep-stats">
 <div class="stat-dark"><div class="sl">Today's Deposits</div><div class="sa" id="repTodayAmt">₦0.00</div><div class="ss" id="repTodayCnt">0 transactions</div></div>
 <div class="stat-light"><div class="sl">Reliability Score</div><div class="sa" id="repScoreVal">—%</div><div class="ss" id="repScoreLbl">calculating…</div></div>
 </div>
 <div class="rep-stats" style="margin-top:10px;">
 <div class="stat-light"><div class="sl">Total Saved</div><div class="sa" id="repAllAmt">₦0.00</div><div class="ss">total</div></div>
 <div class="stat-light"><div class="sl">Confirmations</div><div class="sa" id="repConfirmed">0</div><div class="ss">approved</div></div>
 </div>
 <div style="padding:11px 13px 32px;">
 <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;">
 <div class="search-card-title">My Recent Deposits</div>
 <a href="collections.html" class="tx-viewall" style="background:none;border:none;color:var(--blue);font-size:13px;font-weight:700;text-decoration:none;">View all →</a>
 </div>
 <div id="repTxPreview" class="wcard" style="padding:8px;">
 <div class="tx-empty">No deposits yet</div>
 </div>
 </div>
 </div>
 <!-- Rep bottom nav -->
 <nav class="bnav visible" id="repBnav">
  <button class="bnav-tab active">
   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
   Home
  </button>
  <button class="bnav-tab" onclick="window.location.href='customer-search.html'">
   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
   Search
  </button>
  <button class="bnav-tab" onclick="window.location.href='settings.html'">
   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
   Profile
  </button>
 </nav>
</div>

<script>
requireRole(['representative']);
initTheme();
document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('active'); }));
// Fix 10: verify role server-side before rendering sensitive data
verifyRoleFromDB('representative').then(valid => {
  if (!valid) return window.location.replace(rootPath() + 'login.html');
  renderRepDash();
  requestAnimationFrame(() => startSuspendCheck());
});
</script>
</body>
</html>

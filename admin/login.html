<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Super Admin Portal – WAG</title>
<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/admin.js"></script>
</head>
<body class="light-mode">

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">Please wait…</div>
</div>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">WAG</div>
    <div class="login-title">Super Admin Portal</div>
    <div class="login-sub">WAGE Administration</div>

    <div class="login-warning">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;flex-shrink:0;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Restricted access. Unauthorised entry is prohibited and logged.
    </div>

    <label class="login-label">Admin PIN</label>
    <div class="pin-wrap">
      <input type="password" id="adminPinInp" class="login-inp" placeholder="••••••••" maxlength="20" autocomplete="off">
      <button class="pw-eye" onclick="togglePw('adminPinInp')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;display:inline-block;vertical-align:middle;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div id="loginMsg"></div>
    <div id="lockoutMsg" style="display:none;" class="msg-err">Too many failed attempts. Please wait <span id="lockoutTimer">30</span>s before trying again.</div>

    <button class="login-btn" id="loginBtn" onclick="doAdminLogin()">Access Super Admin Portal</button>

    <p style="text-align:center;font-size:11px;color:var(--sub);margin-top:16px;">
      All login attempts are recorded and audited.
    </p>
  </div>
</div>

<script>
// If a customer/rep is logged in on this device, never let them reach
// the admin login screen at all — kick them straight to their own dashboard.
(function blockNonAdminSessions() {
  let s = null;
  try { s = JSON.parse(sessionStorage.getItem('wagUser')); } catch (e) {}
  if (s && s.role) {
    alert('This area is restricted. You do not have permission to access the admin portal.');
    window.location.replace(rootPath() + (s.role === 'representative' ? 'representative/dashboard.html' : 'customer/dashboard.html'));
  }
})();
// If already logged in this session, skip straight to the dashboard.
(function () {
  if (isAdminLoggedIn()) window.location.replace('dashboard.html');
})();
document.getElementById('adminPinInp').addEventListener('keypress', e => { if (e.key === 'Enter') doAdminLogin(); });
</script>
</body>
</html>
